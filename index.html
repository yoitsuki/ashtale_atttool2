<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AshTale 火力スコアアナライザ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2canvas for Screenshot -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(30, 41, 59, 0.8);
            border-radius: 3px;
        }
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        #screenshot-container { display: none; }
        .hide-on-screenshot { display: inherit; }
        
        #input-memo-header {
            resize: none;
            overflow-y: hidden;
            line-height: 1.5;
            text-align: left;
        }

        .info-popup {
            animation: fadeIn 0.15s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ss-no-wrap {
            white-space: nowrap !important;
        }

        .loading-pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }
        
        #btn-gemini-trigger.hidden { display: none; }
        #btn-gemini-trigger.visible {
            display: flex;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-3px, 0, 0); }
            40%, 60% { transform: translate3d(3px, 0, 0); }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 selection:bg-cyan-900 selection:text-cyan-50">
    <div class="min-h-screen p-4 md:p-6" id="capture-area">
        <div class="max-w-5xl mx-auto">
            
            <!-- ヘッダー -->
            <header class="mb-6 border-b border-slate-800 pb-4" id="ui-header">
                <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                    <div class="text-center md:text-left w-full md:w-auto">
                        <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 flex items-center justify-center md:justify-start">
                            <i data-lucide="flame" class="w-6 h-6 mr-3 text-cyan-400"></i>
                            AshTale 火力スコアアナライザ
                        </h1>
                        <p class="text-slate-500 mt-1 text-[10px] uppercase tracking-widest font-bold opacity-70">
                            Damage Score Reverse Calculation Tool
                        </p>
                    </div>
                    
                    <div class="flex flex-col items-center md:items-end gap-3 w-full md:w-auto">
                        <div class="flex flex-row items-center justify-center md:justify-end gap-3 w-full">
                            <div id="current-time" class="flex items-center text-[11px] text-cyan-500 font-mono bg-cyan-950/30 px-3 h-[34px] rounded-sm border border-cyan-900/40 shadow-inner">
                                <i data-lucide="clock" class="w-3.5 h-3.5 mr-2 opacity-70"></i>
                                <span id="time-display">--/--/-- --:--:--</span>
                            </div>
                            <button id="btn-screenshot" class="hide-on-screenshot flex items-center px-4 h-[34px] bg-slate-900 hover:bg-slate-800 border border-slate-700 text-cyan-400 hover:text-cyan-300 rounded-sm text-xs font-bold transition-all shadow-sm">
                                <i data-lucide="camera" class="w-4 h-4 mr-2"></i>
                                画面を保存
                            </button>
                        </div>
                        <div class="w-full md:max-w-[320px]">
                            <textarea id="input-memo-header" rows="1" placeholder="メモを入力（スクショに反映されます）" class="w-full bg-slate-950/50 border border-slate-800 hover:border-slate-700 rounded-sm px-3 py-1.5 text-[11px] text-slate-400 focus:outline-none focus:border-cyan-900/40 transition-all font-mono placeholder-slate-700 text-left"></textarea>
                        </div>
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 md:gap-6">
                <!-- 左カラム -->
                <div class="lg:col-span-5 flex flex-col gap-4">
                    <div id="reference-image-section" class="hidden hide-on-screenshot bg-slate-900 border border-slate-800 rounded-sm p-4 shadow-md flex-col">
                        <div class="flex justify-between items-center mb-3 border-b border-slate-800 pb-2">
                            <h2 class="text-sm font-bold text-slate-300 flex items-center tracking-wide uppercase">
                                <i data-lucide="image" class="w-4 h-4 mr-2 text-indigo-500"></i>
                                参照画像
                            </h2>
                            <button id="btn-clear-images" class="flex items-center text-[10px] text-slate-500 hover:text-red-400 transition-colors bg-slate-950 px-2 py-1 rounded-sm border border-slate-800">
                                <i data-lucide="x" class="w-3 h-3 mr-1"></i>CLEAR
                            </button>
                        </div>
                        <div class="flex justify-center bg-black/60 rounded-sm overflow-auto max-h-[35vh] border border-slate-800">
                            <img id="main-reference-img" src="" class="block object-contain max-w-full h-auto" style="display: none;" />
                        </div>
                        <div id="image-thumbnails" class="mt-3 flex gap-2 overflow-x-auto custom-scrollbar pb-1" style="display: none;"></div>
                    </div>

                    <!-- ステータス入力 -->
                    <div class="bg-slate-900 border border-slate-800 rounded-sm p-4 shadow-md relative" id="ui-status">
                        <div class="flex justify-between items-center mb-3 border-b border-slate-800 pb-2">
                            <h2 class="text-sm font-bold text-slate-300 flex items-center">
                                <span id="ui-status-icon" class="cursor-pointer select-none active:scale-95 transition-transform mr-2 block">
                                    <i data-lucide="target" class="w-4 h-4 text-blue-500 pointer-events-none"></i>
                                </span>
                                現在のステータス
                                <button id="btn-gemini-trigger" class="hidden ml-3 p-1 rounded-sm bg-indigo-500/20 text-indigo-400 hover:bg-indigo-500/40 transition-all border border-indigo-500/30" title="AIステータス解析">
                                    <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
                                </button>
                            </h2>
                            <div class="hide-on-screenshot flex items-center gap-2">
                                <input type="file" id="image-upload" accept="image/*" multiple class="hidden">
                                <label for="image-upload" class="flex items-center justify-center px-3 h-[34px] bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-sm text-[10px] font-bold cursor-pointer transition-colors text-slate-400">
                                    <i data-lucide="image-plus" class="w-3.5 h-3.5 mr-1.5 text-indigo-500"></i>画像を見ながら入力
                                </label>
                            </div>
                        </div>

                        <div id="ai-status-container" class="hidden mb-3 p-2 bg-indigo-950/20 border border-indigo-900/50 rounded-sm text-[10px] text-indigo-300 font-mono loading-pulse flex items-center">
                            <i data-lucide="loader-2" class="w-3 h-3 mr-2 animate-spin"></i>
                            <span id="ai-status-text">AI解析中...</span>
                        </div>

                        <div class="grid grid-cols-1 xl:grid-cols-2 gap-x-6 gap-y-1">
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="sword" class="w-3.5 h-3.5 mr-2 text-cyan-600"></i><span>攻撃力</span></label>
                                <div class="flex items-center gap-1">
                                    <span id="rate-atk" class="hidden text-[9px] text-indigo-400 font-mono font-bold bg-indigo-950/50 px-1 rounded-sm border border-indigo-900/30"></span>
                                    <input type="text" id="input-atk" class="w-20 sm:w-24 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                                </div>
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="eye" class="w-3.5 h-3.5 mr-2 text-cyan-600"></i><span>威圧</span></label>
                                <div class="flex items-center gap-1">
                                    <span id="rate-intimidation" class="hidden text-[9px] text-indigo-400 font-mono font-bold bg-indigo-950/50 px-1 rounded-sm border border-indigo-900/30"></span>
                                    <input type="text" id="input-intimidation" class="w-20 sm:w-24 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                                </div>
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="zap" class="w-3.5 h-3.5 mr-2 text-cyan-600"></i><span>ダメージ倍率</span></label>
                                <div class="flex items-center gap-1">
                                    <span id="rate-dmgMul" class="hidden text-[9px] text-indigo-400 font-mono font-bold bg-indigo-950/50 px-1 rounded-sm border border-indigo-900/30"></span>
                                    <input type="text" id="input-dmgMul" class="w-20 sm:w-24 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                                </div>
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="arrow-up-circle" class="w-3.5 h-3.5 mr-2 text-cyan-600"></i><span>与ダメージ増加</span></label>
                                <div class="flex items-center gap-1">
                                    <span id="rate-dmgInc" class="hidden text-[9px] text-indigo-400 font-mono font-bold bg-indigo-950/50 px-1 rounded-sm border border-indigo-900/30"></span>
                                    <input type="text" id="input-dmgInc" class="w-20 sm:w-24 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                                </div>
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="crosshair" class="w-3.5 h-3.5 mr-2 text-cyan-600"></i><span>会心ダメージ</span></label>
                                <div class="flex items-center gap-1">
                                    <span id="rate-critDmg" class="hidden text-[9px] text-indigo-400 font-mono font-bold bg-indigo-950/50 px-1 rounded-sm border border-indigo-900/30"></span>
                                    <input type="text" id="input-critDmg" class="w-20 sm:w-24 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                                </div>
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="shield-alert" class="w-3.5 h-3.5 mr-2 text-cyan-600"></i><span>防御無視</span></label>
                                <div class="flex items-center gap-1">
                                    <span id="rate-defIgn" class="hidden text-[9px] text-indigo-400 font-mono font-bold bg-indigo-950/50 px-1 rounded-sm border border-indigo-900/30"></span>
                                    <input type="text" id="input-defIgn" class="w-20 sm:w-24 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                                </div>
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="skull" class="w-3.5 h-3.5 mr-2 text-cyan-600"></i><span>対ボス与ダメ増</span></label>
                                <div class="flex items-center gap-1">
                                    <span id="rate-bossDmg" class="hidden text-[9px] text-indigo-400 font-mono font-bold bg-indigo-950/50 px-1 rounded-sm border border-indigo-900/30"></span>
                                    <input type="text" id="input-bossDmg" class="w-20 sm:w-24 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                                </div>
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="zap" class="w-3.5 h-3.5 mr-2 text-cyan-700"></i><span>状態異常与ダメ増</span></label>
                                <div class="flex items-center gap-1">
                                    <span id="rate-statusDmg" class="hidden text-[9px] text-indigo-400 font-mono font-bold bg-indigo-950/50 px-1 rounded-sm border border-indigo-900/30"></span>
                                    <input type="text" id="input-statusDmg" class="w-20 sm:w-24 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                                </div>
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="target" class="w-3.5 h-3.5 mr-2 text-cyan-700"></i><span>対高HP与ダメ増</span></label>
                                <div class="flex items-center gap-1">
                                    <span id="rate-highHpDmg" class="hidden text-[9px] text-indigo-400 font-mono font-bold bg-indigo-950/50 px-1 rounded-sm border border-indigo-900/30"></span>
                                    <input type="text" id="input-highHpDmg" class="w-20 sm:w-24 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                                </div>
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="target" class="w-3.5 h-3.5 mr-2 text-cyan-700"></i><span>対低HP与ダメ増</span></label>
                                <div class="flex items-center gap-1">
                                    <span id="rate-lowHpDmg" class="hidden text-[9px] text-indigo-400 font-mono font-bold bg-indigo-950/50 px-1 rounded-sm border border-indigo-900/30"></span>
                                    <input type="text" id="input-lowHpDmg" class="w-20 sm:w-24 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                                </div>
                            </div>
                        </div>

                        <!-- AI生データ確認エリア -->
                        <div id="ai-raw-response-container" class="hidden mt-4 p-3 bg-black/50 border border-slate-800 rounded-sm hide-on-screenshot">
                            <div class="flex justify-between items-center mb-2">
                                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-tighter flex items-center">
                                    <i data-lucide="file-json" class="w-3.5 h-3.5 mr-1.5 text-indigo-500"></i> AI Raw Response
                                </p>
                                <button id="btn-close-raw" class="text-slate-600 hover:text-slate-300 transition-colors"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
                            </div>
                            <div id="ai-raw-response-text" class="text-[10px] text-slate-300 font-mono whitespace-pre-wrap break-all h-32 overflow-y-auto custom-scrollbar p-2 bg-slate-950 border border-slate-800 rounded-sm"></div>
                        </div>
                    </div>
                </div>

                <!-- 右カラム -->
                <div class="lg:col-span-7 flex flex-col gap-4 h-full">
                    
                    <!-- 評価表 (隠し機能) -->
                    <div id="ui-evaluation" class="hidden bg-slate-900 border border-slate-800 rounded-sm p-4 md:p-5 shadow-md">
                        <div class="mb-4 flex items-center justify-between border-b border-slate-800 pb-2">
                            <div class="flex items-center">
                                <i data-lucide="bar-chart-2" class="w-4 h-4 mr-2 text-indigo-400"></i>
                                <h2 class="text-sm font-bold text-slate-300">ステータス・バランス評価</h2>
                            </div>
                        </div>
                        <div id="eval-results-container" class="space-y-0 w-full"></div>
                    </div>

                    <!-- 火力1%UP -->
                    <div class="bg-slate-900 border border-slate-800 rounded-sm p-4 md:p-5 shadow-md flex-1" id="ui-result">
                        <div class="mb-4 flex items-center justify-between border-b border-slate-800 pb-2">
                            <div class="flex items-center">
                                <span id="eval-trigger-icon" class="cursor-pointer active:scale-90 transition-transform block">
                                    <i data-lucide="arrow-up-circle" class="w-4 h-4 mr-2 text-cyan-500 pointer-events-none"></i>
                                </span>
                                <h2 class="text-sm font-bold text-slate-300">火力1%UPに必要なステータス</h2>
                            </div>
                        </div>
                        <div id="results-container" class="space-y-0 w-full"></div>
                    </div>
                </div>

            </div>
            
            <footer class="mt-8 pt-4 border-t border-slate-800/60 flex flex-col sm:flex-row justify-between items-center text-[10px] text-slate-600 font-mono tracking-tighter">
                <div>&copy; 2026 AshTale Score Analyzer</div>
                <div class="text-cyan-900">Version 1.0.20</div>
            </footer>
        </div>
    </div>

    <!-- APIキー設定モーダル -->
    <div id="api-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-slate-900 border border-indigo-900/40 p-6 rounded-sm shadow-2xl w-full max-w-sm">
            <div class="flex items-center gap-3 mb-4 text-indigo-400">
                <span id="secret-exec-icon" class="cursor-pointer active:scale-90 transition-transform p-1 hover:bg-white/5 rounded-sm">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                </span>
                <h3 class="text-sm font-bold uppercase tracking-widest">AI Status Parser</h3>
            </div>
            <div class="space-y-4">
                <div class="relative group">
                    <input type="text" id="gemini-api-key-input" autocomplete="off" placeholder="APIキーを入力してください" class="w-full bg-slate-950 border border-slate-800 rounded-sm pl-3 pr-10 py-2.5 text-xs text-white focus:outline-none focus:border-indigo-700 font-mono placeholder-slate-700 transition-colors" />
                    <button id="btn-toggle-key-visibility" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-slate-600 hover:text-slate-400 transition-colors">
                        <i data-lucide="eye" id="icon-key-visibility" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="flex gap-2">
                    <button id="btn-save-api-key" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white text-[11px] font-bold py-2.5 rounded-sm transition-all uppercase tracking-widest active:scale-95 shadow-lg">
                        実行する
                    </button>
                    <button id="btn-close-api-modal" class="px-4 bg-slate-800 hover:bg-slate-700 text-slate-400 text-[11px] font-bold py-2.5 rounded-sm transition-all active:scale-95">
                        閉じる
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- エラー詳細表示モーダル -->
    <div id="error-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center bg-black/95 p-4 backdrop-blur-sm">
        <div class="bg-slate-900 border border-red-900/40 p-5 rounded-sm shadow-2xl w-full max-w-md">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3 text-red-400">
                    <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                    <h3 class="text-sm font-bold uppercase tracking-widest">Analysis Error</h3>
                </div>
                <button id="btn-close-error" class="text-slate-500 hover:text-white transition-colors bg-slate-800 p-1 rounded-sm">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="bg-black/60 border border-slate-800 p-4 rounded-sm mb-4">
                <p id="error-message-summary" class="text-xs text-slate-300 font-bold mb-2">解析に失敗しました。</p>
                <div id="error-details" class="text-[10px] text-slate-500 font-mono break-all whitespace-pre-wrap leading-relaxed max-h-[45vh] overflow-y-auto custom-scrollbar pt-2 border-t border-slate-800"></div>
            </div>
            <button id="btn-copy-error" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 text-[10px] font-bold py-2.5 rounded-sm transition-all flex items-center justify-center gap-2 border border-slate-700">
                <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                エラー内容をコピー
            </button>
        </div>
    </div>

    <!-- スクショ用一時レイアウト -->
    <div id="screenshot-temp-wrapper" style="position: absolute; left: -9999px; top: -9999px; background-color: #020617;">
        <div id="screenshot-layout-root" class="bg-slate-950 text-slate-200 p-5 flex items-end gap-3" style="width: 450px;">
            <div id="ss-left-col" class="flex-1 flex flex-col gap-3 w-full"></div>
            <div id="ss-right-col" class="flex-1 flex flex-col gap-3 w-full"></div>
        </div>
    </div>

    <!-- スクショ保存用モーダル -->
    <div id="screenshot-modal" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/95 backdrop-blur-sm p-4">
        <div class="bg-slate-900 border border-slate-800 p-4 rounded-sm shadow-2xl max-w-full max-h-full flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <p class="text-xs text-cyan-600 font-bold flex items-center">
                    <i data-lucide="download" class="w-3.5 h-3.5 mr-2"></i>画像を長押しして保存
                </p>
                <button id="btn-close-screenshot-modal" class="text-slate-500 hover:text-white transition-colors bg-slate-800 p-1.5 rounded-sm">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="overflow-auto bg-black flex-1 border border-slate-800 rounded-sm">
                <img id="screenshot-image" src="" alt="Screenshot" class="max-w-full h-auto object-contain mx-auto block" />
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let geminiApiKey = ""; 
        let hasSetupInitial = false;
        let isAdvancedMode = false; 

        const state = {
            stats: {
                atk: '', intimidation: '', dmgMul: '', dmgInc: '', critDmg: '', 
                defIgn: '', bossDmg: '', statusDmg: '', 
                highHpDmg: '', lowHpDmg: ''
            }
        };

        const inputs = {
            atk: document.getElementById('input-atk'),
            intimidation: document.getElementById('input-intimidation'),
            dmgMul: document.getElementById('input-dmgMul'),
            dmgInc: document.getElementById('input-dmgInc'),
            critDmg: document.getElementById('input-critDmg'),
            defIgn: document.getElementById('input-defIgn'),
            bossDmg: document.getElementById('input-bossDmg'),
            statusDmg: document.getElementById('input-statusDmg'),
            highHpDmg: document.getElementById('input-highHpDmg'),
            lowHpDmg: document.getElementById('input-lowHpDmg'),
        };

        const resultsContainer = document.getElementById('results-container');
        const timeDisplay = document.getElementById('time-display');
        const btnScreenshot = document.getElementById('btn-screenshot');
        
        // AI OCR
        const statusIcon = document.getElementById('ui-status-icon');
        const btnGeminiTrigger = document.getElementById('btn-gemini-trigger');
        const apiModal = document.getElementById('api-modal');
        const apiKeyInput = document.getElementById('gemini-api-key-input');
        const btnToggleKeyVisibility = document.getElementById('btn-toggle-key-visibility');
        const iconKeyVisibility = document.getElementById('icon-key-visibility');
        const btnSaveApiKey = document.getElementById('btn-save-api-key');
        const btnCloseApiModal = document.getElementById('btn-close-api-modal');
        const secretExecIcon = document.getElementById('secret-exec-icon');
        const aiStatusContainer = document.getElementById('ai-status-container');
        const aiStatusText = document.getElementById('ai-status-text');

        const aiRawResponseContainer = document.getElementById('ai-raw-response-container');
        const aiRawResponseText = document.getElementById('ai-raw-response-text');
        const btnCloseRaw = document.getElementById('btn-close-raw');

        const evalTriggerIcon = document.getElementById('eval-trigger-icon');
        const uiEvaluation = document.getElementById('ui-evaluation');
        const evalResultsContainer = document.getElementById('eval-results-container');

        const errorModal = document.getElementById('error-modal');
        const errorDetails = document.getElementById('error-details');
        const errorSummary = document.getElementById('error-message-summary');
        const btnCloseError = document.getElementById('btn-close-error');
        const btnCopyError = document.getElementById('btn-copy-error');

        const screenshotModal = document.getElementById('screenshot-modal');
        const screenshotImage = document.getElementById('screenshot-image');
        const btnCloseScreenshotModal = document.getElementById('btn-close-screenshot-modal');
        const fileInput = document.getElementById('image-upload');
        const refImageSection = document.getElementById('reference-image-section');
        const mainReferenceImg = document.getElementById('main-reference-img');
        const imageThumbnails = document.getElementById('image-thumbnails');
        const btnClearImages = document.getElementById('btn-clear-images');
        
        let loadedImages = [];
        let selectedImgIndex = 0;

        function updateTime() {
            const now = new Date();
            timeDisplay.textContent = now.toLocaleString('ja-JP', { 
                year: 'numeric', month: '2-digit', day: '2-digit', 
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            });
        }
        setInterval(updateTime, 1000);
        updateTime();

        function adjustMemoHeight() {
            const memo = document.getElementById('input-memo-header');
            memo.style.height = 'auto';
            memo.style.height = memo.scrollHeight + 'px';
        }
        document.getElementById('input-memo-header').addEventListener('input', adjustMemoHeight);

        // UI生成用関数（画面表示用）
        function generateResultHtml(isScreenshot = false) {
            const v = {
                atk: parseFloat(state.stats.atk) || 0,
                intimidation: parseFloat(state.stats.intimidation) || 0,
                dmgMul: parseFloat(state.stats.dmgMul) || 0,
                dmgInc: parseFloat(state.stats.dmgInc) || 0,
                critDmg: parseFloat(state.stats.critDmg) || 0,
                bossDmg: parseFloat(state.stats.bossDmg) || 0,
                statusDmg: parseFloat(state.stats.statusDmg) || 0,
                highHpDmg: parseFloat(state.stats.highHpDmg) || 0,
                lowHpDmg: parseFloat(state.stats.lowHpDmg) || 0,
            };
            const shlSum = v.statusDmg + v.highHpDmg + v.lowHpDmg;
            const isAnyInput = Object.values(state.stats).some(val => val !== '');
            const p = {
                atk: v.atk * 0.01,
                intimidation: isAnyInput ? (10 + (v.intimidation * 0.01)) : 0,
                dmgMul: v.dmgMul, 
                dmgInc: v.dmgInc * 0.01,
                critDmg: v.critDmg * 0.01,
                bossDmg: v.bossDmg * 0.01,
                statusDmg: shlSum * 0.01,
                highHpDmg: shlSum * 0.02, 
                lowHpDmg: shlSum * 0.02,  
                defIgn: '---'
            };
            
            Object.keys(p).forEach(key => {
                if (typeof p[key] === 'number') p[key] = p[key] > 0 ? p[key].toFixed(2) : 0;
            });

            const headerClass = isScreenshot 
                ? "flex justify-between px-1 pb-1 border-b border-slate-800/30 uppercase tracking-tighter ss-no-wrap"
                : "flex justify-between px-2 pb-1 text-[10px] font-bold text-slate-600 border-b border-slate-800/30 uppercase tracking-tighter";
            
            const headerSpans = isScreenshot
                ? `<span class="font-bold text-slate-500" style="font-size: 7px !important;">Stat Name</span><span class="font-bold text-slate-500" style="font-size: 7px !important;">Req.</span>`
                : `<span>Stat Name</span><span>Required Amount</span>`;

            function row(label, value, key, unit) {
                const displayUnit = (value !== '---' && value !== 0) ? unit : '';
                let infoBtnHtml = '';
                if (!isScreenshot) {
                    if (key === 'highHpDmg' || key === 'lowHpDmg') {
                        infoBtnHtml = `<div class="relative group ml-1.5 inline-flex items-center"><i data-lucide="info" class="w-3 h-3 text-slate-600 cursor-help"></i><div class="absolute left-0 bottom-full mb-2 hidden group-hover:block z-50 w-48 p-2 bg-slate-800 text-[10px] text-slate-200 rounded shadow-xl border border-slate-700 info-popup leading-relaxed whitespace-normal break-words">稼働率を50%と仮定し計算しています。</div></div>`;
                    } else if (key === 'defIgn') {
                        infoBtnHtml = `<div class="relative group ml-1.5 inline-flex items-center"><i data-lucide="info" class="w-3 h-3 text-slate-600 cursor-help"></i><div class="absolute left-0 bottom-full mb-2 hidden group-hover:block z-50 w-48 p-2 bg-slate-800 text-[10px] text-slate-200 rounded shadow-xl border border-slate-700 info-popup leading-relaxed whitespace-normal break-words">敵防御力等に依存するため計算対象外です。</div></div>`;
                    }
                }
                const rClass = isScreenshot ? "flex justify-between items-center py-1 px-1 border-b border-slate-800/40" : "flex justify-between items-center py-2 px-2 border-b border-slate-800/40 hover:bg-slate-800/10 transition-colors";
                const lClass = isScreenshot ? "text-slate-400 ss-no-wrap flex items-center" : "text-xs text-slate-400 flex items-center";
                const lStyle = isScreenshot ? "font-size: 8px !important;" : "";
                const vClass = isScreenshot ? "font-mono text-slate-100" : "text-sm font-mono font-bold text-slate-100";
                const vStyle = isScreenshot ? "font-size: 8px !important;" : "";
                
                return `<div class="${rClass}">
                    <div class="${lClass}" style="${lStyle}"><span>${label}</span>${infoBtnHtml}</div>
                    <div class="flex items-center"><span class="${vClass}" style="${vStyle}">${value}${displayUnit}</span></div>
                </div>`;
            }

            return `<div class="${headerClass}">${headerSpans}</div>
                ${row('攻撃力', p.atk, 'atk', '')}
                ${row('威圧', p.intimidation, 'intimidation', '')}
                ${row('ダメージ倍率', p.dmgMul, 'dmgMul', '%')}
                ${row('与ダメージ増加', p.dmgInc, 'dmgInc', '%')}
                ${row('会心ダメージ', p.critDmg, 'critDmg', '%')}
                ${row('対ボス与ダメ増', p.bossDmg, 'bossDmg', '%')}
                ${row('状態異常与ダメ増', p.statusDmg, 'statusDmg', '%')}
                ${row('対高HP与ダメ増', p.highHpDmg, 'highHpDmg', '%')}
                ${row('対低HP与ダメ増', p.lowHpDmg, 'lowHpDmg', '%')}
                ${row('防御無視', p.defIgn, 'defIgn', '')}
            `;
        }

        function generateEvalHtml(isScreenshot = false) {
            const v = {
                atk: parseFloat(state.stats.atk) || 0,
                intimidation: parseFloat(state.stats.intimidation) || 0,
                dmgMul: parseFloat(state.stats.dmgMul) || 0,
                dmgInc: parseFloat(state.stats.dmgInc) || 0,
                critDmg: parseFloat(state.stats.critDmg) || 0,
                bossDmg: parseFloat(state.stats.bossDmg) || 0,
                statusDmg: parseFloat(state.stats.statusDmg) || 0,
                highHpDmg: parseFloat(state.stats.highHpDmg) || 0,
                lowHpDmg: parseFloat(state.stats.lowHpDmg) || 0,
            };
            const shlSum = v.statusDmg + v.highHpDmg + v.lowHpDmg;
            const isAnyInput = Object.values(state.stats).some(val => val !== '');
            const p = {
                atk: v.atk * 0.01,
                intimidation: isAnyInput ? (10 + (v.intimidation * 0.01)) : 0,
                dmgMul: v.dmgMul, 
                dmgInc: v.dmgInc * 0.01,
                critDmg: v.critDmg * 0.01,
                bossDmg: v.bossDmg * 0.01,
                statusDmg: shlSum * 0.01,
                highHpDmg: shlSum * 0.02, 
                lowHpDmg: shlSum * 0.02,  
            };
            const rates = {
                atk: p.atk / (v.atk || Infinity) * 100,
                intimidation: p.intimidation / (v.intimidation || Infinity) * 100,
                dmgMul: p.dmgMul / (v.dmgMul || Infinity) * 100,
                dmgInc: p.dmgInc / (v.dmgInc || Infinity) * 100,
                critDmg: p.critDmg / (v.critDmg || Infinity) * 100,
                bossDmg: p.bossDmg / (v.bossDmg || Infinity) * 100,
                statusDmg: p.statusDmg / (v.statusDmg || Infinity) * 100,
                highHpDmg: p.highHpDmg / (v.highHpDmg || Infinity) * 100,
                lowHpDmg: p.lowHpDmg / (v.lowHpDmg || Infinity) * 100,
            };

            const atkTarget = v.dmgMul * 20000;
            const atkEval = v.atk === 0 ? "-" : (v.atk >= atkTarget ? "〇" : "△");
            
            const dmgIncTarget = 170.0;
            const dmgIncEval = v.dmgInc === 0 ? "-" : (v.dmgInc >= dmgIncTarget ? "〇" : "△");
            
            const critTarget = v.dmgMul * 60;
            const critEval = v.critDmg === 0 ? "-" : (v.critDmg >= critTarget ? "〇" : "△");
            
            const statusTarget = v.critDmg * (230 / 730);
            const statusEval = v.statusDmg === 0 ? "-" : (v.statusDmg >= statusTarget ? "〇" : "△");
            
            const intEff = rates.intimidation === Infinity ? "-" : (rates.intimidation <= 4 ? "〇" : "△");
            const statEff = rates.statusDmg === Infinity ? "-" : (rates.statusDmg <= 4 ? "〇" : "△");
            const highEff = rates.highHpDmg === Infinity ? "-" : (rates.highHpDmg <= 4 ? "〇" : "△");
            const lowEff = rates.lowHpDmg === Infinity ? "-" : (rates.lowHpDmg <= 4 ? "〇" : "△");

            const headerClass = isScreenshot 
                ? "flex justify-between px-1 pb-1 border-b border-slate-800/30 uppercase tracking-tighter ss-no-wrap"
                : "flex justify-between px-2 pb-1 text-[9px] font-bold text-slate-500 border-b border-slate-800/30 uppercase tracking-tighter";
            
            const headerSpans = isScreenshot
                ? `<span class="font-bold text-slate-500" style="font-size: 7px !important;">Metric</span><span class="font-bold text-slate-500" style="font-size: 7px !important;">Target / Status</span>`
                : `<span>Metric</span><span>Target / Status</span>`;

            function row(label, evalMark, targetValue, tooltipText) {
                const rClass = isScreenshot ? "flex justify-between items-center py-1 px-1 border-b border-slate-800/40" : "flex justify-between items-center py-1.5 px-2 border-b border-slate-800/40 hover:bg-slate-800/10 transition-colors";
                const lClass = isScreenshot ? "text-slate-400 ss-no-wrap flex items-center" : "text-xs text-slate-400 flex items-center";
                const lStyle = isScreenshot ? "font-size: 8px !important;" : "";
                const vClass = isScreenshot ? "font-mono text-slate-300" : "text-[11px] font-mono text-slate-300";
                const vStyle = isScreenshot ? "font-size: 8px !important;" : "";
                
                let markColor = "text-slate-500";
                if (evalMark === "〇") markColor = "text-green-400 font-bold";
                else if (evalMark === "△") markColor = "text-yellow-400 font-bold";
                const markClass = isScreenshot ? markColor : `text-sm ${markColor}`;
                const mStyle = isScreenshot ? "font-size: 9px !important;" : "";

                let infoIcon = '';
                if (!isScreenshot && tooltipText) {
                    infoIcon = `<div class="relative group ml-1.5 inline-flex items-center">
                        <i data-lucide="info" class="w-3 h-3 text-slate-600 cursor-help"></i>
                        <div class="absolute left-0 bottom-full mb-2 hidden group-hover:block z-50 w-48 p-2 bg-slate-800 text-[10px] text-slate-200 rounded shadow-xl border border-slate-700 info-popup leading-relaxed whitespace-normal break-words">
                            ${tooltipText}
                        </div>
                    </div>`;
                }

                return `<div class="${rClass}">
                    <div class="${lClass}" style="${lStyle}"><span>${label}</span>${infoIcon}</div>
                    <div class="flex items-center gap-3">
                        <span class="${vClass}" style="${vStyle}">${targetValue}</span>
                        <span class="${markClass}" style="${mStyle}">${evalMark}</span>
                    </div>
                </div>`;
            }

            return `<div class="${headerClass}">${headerSpans}</div>
                ${row('攻撃力', atkEval, `目標: ${atkTarget.toFixed(0)}`, 'ダメージ倍率の約2万倍以上で〇')}
                ${row('与ダメージ増加', dmgIncEval, `目標: ${dmgIncTarget.toFixed(2)}%`, '目安として約170%以上で〇')}
                ${row('会心ダメージ', critEval, `目標: ${critTarget.toFixed(2)}%`, 'ダメージ倍率×60が目安')}
                ${row('異常ダメ(バランス)', statusEval, `目標: ${statusTarget.toFixed(2)}%`, '会心ダメ730%の時、異常ダメ230%がバランスの目安')}
                ${row('威圧 効率', intEff, rates.intimidation !== Infinity ? `上昇率: ${rates.intimidation.toFixed(2)}%` : '-', '火力1%UPに必要なステータス上昇率。4%超えはステータスが低すぎると判定')}
                ${row('異常ダメ 効率', statEff, rates.statusDmg !== Infinity ? `上昇率: ${rates.statusDmg.toFixed(2)}%` : '-', '火力1%UPに必要なステータス上昇率。4%超えはステータスが低すぎると判定')}
                ${row('高HPダメ 効率', highEff, rates.highHpDmg !== Infinity ? `上昇率: ${rates.highHpDmg.toFixed(2)}%` : '-', '火力1%UPに必要なステータス上昇率。4%超えはステータスが低すぎると判定')}
                ${row('低HPダメ 効率', lowEff, rates.lowHpDmg !== Infinity ? `上昇率: ${rates.lowHpDmg.toFixed(2)}%` : '-', '火力1%UPに必要なステータス上昇率。4%超えはステータスが低すぎると判定')}
            `;
        }

        function calculateAndRender() {
            const v = {
                atk: parseFloat(state.stats.atk) || 0,
                intimidation: parseFloat(state.stats.intimidation) || 0,
                dmgMul: parseFloat(state.stats.dmgMul) || 0,
                dmgInc: parseFloat(state.stats.dmgInc) || 0,
                critDmg: parseFloat(state.stats.critDmg) || 0,
                bossDmg: parseFloat(state.stats.bossDmg) || 0,
                statusDmg: parseFloat(state.stats.statusDmg) || 0,
                highHpDmg: parseFloat(state.stats.highHpDmg) || 0,
                lowHpDmg: parseFloat(state.stats.lowHpDmg) || 0,
            };
            const shlSum = v.statusDmg + v.highHpDmg + v.lowHpDmg;
            const isAnyInput = Object.values(state.stats).some(val => val !== '');
            const p = {
                atk: v.atk * 0.01,
                intimidation: isAnyInput ? (10 + (v.intimidation * 0.01)) : 0,
                dmgMul: v.dmgMul, 
                dmgInc: v.dmgInc * 0.01,
                critDmg: v.critDmg * 0.01,
                bossDmg: v.bossDmg * 0.01,
                statusDmg: shlSum * 0.01,
                highHpDmg: shlSum * 0.02, 
                lowHpDmg: shlSum * 0.02,  
            };
            
            const rates = {
                atk: p.atk / (v.atk || Infinity) * 100,
                intimidation: p.intimidation / (v.intimidation || Infinity) * 100,
                dmgMul: p.dmgMul / (v.dmgMul || Infinity) * 100,
                dmgInc: p.dmgInc / (v.dmgInc || Infinity) * 100,
                critDmg: p.critDmg / (v.critDmg || Infinity) * 100,
                bossDmg: p.bossDmg / (v.bossDmg || Infinity) * 100,
                statusDmg: p.statusDmg / (v.statusDmg || Infinity) * 100,
                highHpDmg: p.highHpDmg / (v.highHpDmg || Infinity) * 100,
                lowHpDmg: p.lowHpDmg / (v.lowHpDmg || Infinity) * 100,
            };

            // Update Rates Badges
            Object.keys(rates).forEach(key => {
                const el = document.getElementById(`rate-${key}`);
                if (el) {
                    if (isAdvancedMode && rates[key] > 0 && rates[key] !== Infinity) {
                        el.textContent = `+${rates[key].toFixed(2)}%`;
                        el.classList.remove('hidden');
                    } else {
                        el.classList.add('hidden');
                    }
                }
            });

            // Update Evaluation Table
            if (isAdvancedMode) {
                uiEvaluation.classList.remove('hidden');
                evalResultsContainer.innerHTML = generateEvalHtml(false);
            } else {
                uiEvaluation.classList.add('hidden');
            }

            // Update Results Table
            resultsContainer.innerHTML = generateResultHtml(false);
            lucide.createIcons();
            Object.keys(inputs).forEach(key => { inputs[key].value = state.stats[key]; });
        }

        Object.keys(inputs).forEach(key => {
            inputs[key].addEventListener('input', (e) => {
                const val = e.target.value;
                if (val === '' || /^\d*\.?\d*$/.test(val)) {
                    state.stats[key] = val;
                    calculateAndRender();
                } else {
                    e.target.value = state.stats[key];
                }
            });
        });

        // 隠しボタンのトリガー
        let iconClickCount = 0;
        let iconClickTimer;
        statusIcon.addEventListener('click', () => {
            iconClickCount++;
            clearTimeout(iconClickTimer);
            if (iconClickCount >= 2) {
                btnGeminiTrigger.classList.remove('hidden');
                btnGeminiTrigger.classList.add('visible');
                iconClickCount = 0;
            } else {
                iconClickTimer = setTimeout(() => { iconClickCount = 0; }, 300);
            }
        });

        let evalClickCount = 0;
        let evalClickTimer;
        evalTriggerIcon.addEventListener('click', () => {
            evalClickCount++;
            clearTimeout(evalClickTimer);
            if (evalClickCount >= 2) {
                isAdvancedMode = !isAdvancedMode;
                calculateAndRender();
                evalClickCount = 0;
            } else {
                evalClickTimer = setTimeout(() => { evalClickCount = 0; }, 300);
            }
        });

        btnGeminiTrigger.addEventListener('click', () => {
            if (!hasSetupInitial) apiModal.classList.remove('hidden');
            else triggerFileUpload();
        });

        function triggerFileUpload() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            input.onchange = (e) => handleGeminiOcr(Array.from(e.target.files));
            input.click();
        }

        btnToggleKeyVisibility.addEventListener('click', () => {
            const isText = apiKeyInput.type === 'text';
            apiKeyInput.type = isText ? 'password' : 'text';
            iconKeyVisibility.setAttribute('data-lucide', isText ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        secretExecIcon.addEventListener('click', () => {
            geminiApiKey = ""; 
            hasSetupInitial = true;
            apiModal.classList.add('hidden');
            triggerFileUpload();
        });

        btnSaveApiKey.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (!key) {
                apiKeyInput.classList.add('border-red-600', 'shake');
                setTimeout(() => apiKeyInput.classList.remove('border-red-600', 'shake'), 400);
                return;
            }
            geminiApiKey = key; 
            hasSetupInitial = true;
            apiModal.classList.add('hidden');
            triggerFileUpload();
        });
        
        btnCloseApiModal.addEventListener('click', () => apiModal.classList.add('hidden'));
        btnCloseRaw.addEventListener('click', () => aiRawResponseContainer.classList.add('hidden'));

        function showAnalysisError(summary, details) {
            errorSummary.textContent = summary;
            errorDetails.textContent = details;
            errorModal.classList.remove('hidden');
        }

        btnCloseError.addEventListener('click', () => { errorModal.classList.add('hidden'); });

        btnCopyError.addEventListener('click', () => {
            const text = `Diagnostic Summary: ${errorSummary.textContent}\nRaw Logs:\n${errorDetails.textContent}`;
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            btnCopyError.textContent = "コピー完了";
            setTimeout(() => { btnCopyError.textContent = "エラー内容をコピー"; }, 2000);
        });

        function showRawResponse(text) {
            aiRawResponseText.textContent = text;
            aiRawResponseContainer.classList.remove('hidden');
        }

        // API Call Logic
        async function callGemini(payload, currentKey, retryCount = 0) {
            // 元々動いていた「変数に代入してからfetchに渡す」形に完全に戻します。
            // これによりCanvas環境のキー自動注入システムが正しく働きます。
            const endpoint = currentKey === "" 
                ? `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${currentKey}`
                : `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentKey}`;
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (!response.ok) {
                    const errorDetailStr = result.error ? JSON.stringify(result.error, null, 2) : `HTTP status: ${response.status}`;
                    if (response.status >= 500 && retryCount < 5) {
                        const delay = Math.pow(2, retryCount) * 1000;
                        await new Promise(r => setTimeout(r, delay));
                        return callGemini(payload, currentKey, retryCount + 1);
                    }
                    throw new Error(`API Error Code: ${response.status}\n\nDetails:\n${errorDetailStr}`);
                }
                return result;
            } catch (err) {
                if (err.message.includes('fetch') && retryCount < 5) {
                    const delay = Math.pow(2, retryCount) * 1000;
                    await new Promise(r => setTimeout(r, delay));
                    return callGemini(payload, currentKey, retryCount + 1);
                }
                throw err;
            }
        }

        async function handleGeminiOcr(files) {
            if (!files.length) return;
            aiStatusContainer.classList.remove('hidden');
            aiStatusText.textContent = "AI解析を準備中...";
            aiRawResponseContainer.classList.add('hidden');
            
            let rawText = "";

            try {
                const imageParts = await Promise.all(files.map(async file => {
                    const base64 = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.onerror = () => reject(new Error("画像の読み込みに失敗しました。"));
                        reader.readAsDataURL(file);
                    });
                    return { inlineData: { mimeType: file.type, data: base64 } };
                }));

                const systemPrompt = `AshTale(アッシュテイル)のステータス画面を解析してください。
必ず以下のJSON形式の文字列のみを出力してください（Markdownの修飾や挨拶は不要です）。%記号やカンマは除外し数値のみを記載してください。
項目が見つからない場合は null または "0" を指定してください。
{
  "atk": 数値,
  "intimidation": 数値,
  "dmgMul": 数値,
  "dmgInc": 数値,
  "critDmg": 数値,
  "defIgn": 数値,
  "bossDmg": 数値,
  "statusDmg": 数値,
  "highHpDmg": 数値,
  "lowHpDmg": 数値
}`;

                const payload = {
                    contents: [{ parts: [{ text: "画像から数値を抽出してください。" }, ...imageParts] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: { responseMimeType: "application/json" }
                };

                const result = await callGemini(payload, geminiApiKey);
                
                rawText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (!rawText) {
                    rawText = JSON.stringify(result, null, 2);
                    throw new Error("解析データが取得できませんでした。\nAPIレスポンスを参照してください。");
                }

                // 生データを表示
                showRawResponse(rawText);

                // JSONのクリーンアップとフォールバック
                let cleanText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                let data = {};
                
                try {
                    data = JSON.parse(cleanText);
                } catch (parseError) {
                    console.warn("JSON parse failed, trying regex fallback", parseError);
                    const keys = ['atk', 'intimidation', 'dmgMul', 'dmgInc', 'critDmg', 'defIgn', 'bossDmg', 'statusDmg', 'highHpDmg', 'lowHpDmg'];
                    let found = false;
                    keys.forEach(k => {
                        const regex = new RegExp(`"${k}"\\s*:\\s*"?([\\d\\.,]+)"?`, 'i');
                        const match = cleanText.match(regex);
                        if (match) {
                            data[k] = match[1].replace(/,/g, '');
                            found = true;
                        }
                    });
                    if (!found) {
                        throw new Error("JSONのパースに失敗し、データも抽出できませんでした。\n" + parseError.message);
                    }
                }

                Object.keys(data).forEach(key => {
                    if (data[key] !== null && data[key] !== "0" && data[key] !== "") {
                        const valStr = String(data[key]).replace(/,/g, '');
                        state.stats[key] = valStr;
                    }
                });

                calculateAndRender();
                aiStatusText.textContent = "解析が完了しました！";
                setTimeout(() => aiStatusContainer.classList.add('hidden'), 3000);
            } catch (err) {
                console.error(err);
                aiStatusContainer.classList.add('hidden');
                showAnalysisError("AI解析エラー", err.message);
                if (rawText) {
                    showRawResponse(rawText);
                }
            }
        }

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            refImageSection.classList.remove('hidden');
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    loadedImages.push(ev.target.result);
                    renderThumbnails();
                    if (loadedImages.length === 1) setMainImage(0);
                };
                reader.readAsDataURL(file);
            });
            fileInput.value = '';
        });

        function renderThumbnails() {
            imageThumbnails.innerHTML = '';
            if (loadedImages.length <= 1) {
                imageThumbnails.style.display = 'none';
            } else {
                imageThumbnails.style.display = 'flex';
                loadedImages.forEach((data, idx) => {
                    const img = document.createElement('img');
                    img.src = data;
                    const isSelected = idx === selectedImgIndex;
                    img.className = `w-12 h-12 object-cover border-2 rounded-sm cursor-pointer transition-all flex-shrink-0 ${isSelected ? 'border-cyan-500 opacity-100' : 'border-transparent opacity-50 hover:opacity-100'}`;
                    img.onclick = () => setMainImage(idx);
                    imageThumbnails.appendChild(img);
                });
            }
        }

        function setMainImage(idx) {
            selectedImgIndex = idx;
            mainReferenceImg.src = loadedImages[idx];
            mainReferenceImg.style.display = 'block';
            renderThumbnails();
        }

        btnClearImages.addEventListener('click', () => {
            loadedImages = [];
            selectedImgIndex = 0;
            mainReferenceImg.src = '';
            mainReferenceImg.style.display = 'none';
            refImageSection.classList.add('hidden');
            aiRawResponseContainer.classList.add('hidden');
        });

        // スクリーンショット保存処理
        btnScreenshot.addEventListener('click', async () => {
            document.body.style.cursor = 'wait';
            const ssLayoutRoot = document.getElementById('screenshot-layout-root');
            const ssLeftCol = document.getElementById('ss-left-col');
            const ssRightCol = document.getElementById('ss-right-col');
            ssLeftCol.innerHTML = '';
            ssRightCol.innerHTML = '';

            // Header (Rebuild cleanly)
            const headerClone = document.createElement('div');
            headerClone.className = "border-b border-slate-800 pb-2 mb-2 flex flex-col items-center gap-1 w-full";
            
            const h1Clone = document.createElement('h1');
            h1Clone.className = "font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 flex items-center justify-center ss-no-wrap";
            h1Clone.style.cssText = "font-size: 14px !important; line-height: 1 !important; margin: 0;";
            h1Clone.innerHTML = `<i data-lucide="flame" class="text-cyan-400" style="width: 14px !important; height: 14px !important; margin-right: 4px !important;"></i>AshTale 火力スコアアナライザ`;
            headerClone.appendChild(h1Clone);
            
            const timeInfoClone = document.createElement('div');
            timeInfoClone.className = "flex items-center text-slate-500 font-mono";
            timeInfoClone.style.cssText = "font-size: 8px !important; margin: 0; padding: 0;";
            timeInfoClone.innerHTML = `<i data-lucide="clock" style="width: 8px !important; height: 8px !important; margin-right: 2px !important;"></i>${document.getElementById('time-display').textContent}`;
            headerClone.appendChild(timeInfoClone);

            const memoVal = document.getElementById('input-memo-header').value.trim();
            if (memoVal) {
                const memoDisplay = document.createElement('div');
                memoDisplay.className = "text-[7px] text-slate-400 font-mono text-left whitespace-pre-wrap leading-tight mt-1 px-1 border-l border-slate-800 w-full";
                memoDisplay.textContent = memoVal;
                headerClone.appendChild(memoDisplay);
            }
            ssLeftCol.appendChild(headerClone);

            // Status (Rebuild cleanly)
            const statusClone = document.createElement('div');
            statusClone.className = "bg-slate-900/50 border border-slate-800 rounded-sm p-2 flex-1 w-full";
            statusClone.innerHTML = `<h2 class="text-[8px] font-bold text-slate-400 mb-1 ss-no-wrap flex items-center">現在のステータス</h2>`;
            
            const grid = document.createElement('div');
            grid.className = "flex flex-col gap-0";
            
            const statsOrder = [
                {id: 'atk', label: '攻撃力', icon: 'sword'},
                {id: 'intimidation', label: '威圧', icon: 'eye'},
                {id: 'dmgMul', label: 'ダメージ倍率', icon: 'zap'},
                {id: 'dmgInc', label: '与ダメージ増加', icon: 'arrow-up-circle'},
                {id: 'critDmg', label: '会心ダメージ', icon: 'crosshair'},
                {id: 'defIgn', label: '防御無視', icon: 'shield-alert'},
                {id: 'bossDmg', label: '対ボス与ダメ増', icon: 'skull'},
                {id: 'statusDmg', label: '状態異常与ダメ増', icon: 'zap'},
                {id: 'highHpDmg', label: '対高HP与ダメ増', icon: 'target'},
                {id: 'lowHpDmg', label: '対低HP与ダメ増', icon: 'target'}
            ];

            statsOrder.forEach(stat => {
                const val = document.getElementById(`input-${stat.id}`).value || "0";
                const rateEl = document.getElementById(`rate-${stat.id}`);
                const hasRate = rateEl && !rateEl.classList.contains('hidden') && isAdvancedMode;
                const rateText = hasRate ? rateEl.textContent : "";

                const row = document.createElement('div');
                row.className = "flex justify-between items-center py-1 px-1 border-b border-slate-800/40 w-full";
                
                let rateHtml = hasRate ? `<span class="text-[6px] text-indigo-400 font-mono font-bold bg-indigo-950/50 px-1 rounded-sm border border-indigo-900/30 mr-1.5">${rateText}</span>` : "";

                row.innerHTML = `
                    <div class="text-[8px] text-slate-500 ss-no-wrap flex items-center">
                        <i data-lucide="${stat.icon}" style="width:10px !important; height:10px !important; margin-right:4px !important;"></i>
                        <span>${stat.label}</span>
                    </div>
                    <div class="flex items-center justify-end h-full">
                        ${rateHtml}
                        <span class="text-[9px] font-mono font-bold text-slate-100">${val}</span>
                    </div>
                `;
                grid.appendChild(row);
            });
            statusClone.appendChild(grid);
            ssLeftCol.appendChild(statusClone);

            // Evaluation Table (If active)
            if (isAdvancedMode) {
                const evalClone = document.createElement('div');
                evalClone.className = "bg-slate-900 border border-slate-800 rounded-sm p-2 mb-2 shadow-md w-full";
                evalClone.innerHTML = `
                    <h2 class="text-[8px] font-bold text-indigo-400 mb-1 ss-no-wrap flex items-center">
                        <i data-lucide="bar-chart-2" style="width:10px !important; height:10px !important; margin-right:4px !important;"></i>
                        ステータス・バランス評価
                    </h2>
                    <div class="space-y-0 w-full">
                        ${generateEvalHtml(true)}
                    </div>
                `;
                ssRightCol.appendChild(evalClone);
            }

            // Results Table
            const resultClone = document.createElement('div');
            resultClone.className = "bg-slate-900 border border-slate-800 rounded-sm p-2 h-full flex-1 w-full";
            resultClone.innerHTML = `
                <h2 class="text-[8px] font-bold text-cyan-600 mb-1 ss-no-wrap flex items-center">
                    <i data-lucide="arrow-up-circle" style="width:10px !important; height:10px !important; margin-right:4px !important;"></i>
                    火力1%UPに必要なステータス
                </h2>
                <div class="space-y-0 w-full">
                    ${generateResultHtml(true)}
                </div>
            `;
            ssRightCol.appendChild(resultClone);
            
            // Re-initialize icons inside the screenshot layout
            lucide.createIcons({ root: ssLayoutRoot });

            setTimeout(() => {
                html2canvas(ssLayoutRoot, { backgroundColor: '#020617', scale: 2, logging: false, useCORS: true, width: 450 }).then(canvas => {
                    document.body.style.cursor = 'default';
                    screenshotImage.src = canvas.toDataURL('image/png');
                    screenshotModal.classList.remove('hidden');
                }).catch((err) => {
                    document.body.style.cursor = 'default';
                    console.error("Screenshot error:", err);
                    alert('保存に失敗しました。');
                });
            }, 600);
        });

        btnCloseScreenshotModal.addEventListener('click', () => { screenshotModal.classList.add('hidden'); screenshotImage.src = ''; });
        screenshotModal.addEventListener('click', (e) => { if (e.target === screenshotModal) { screenshotModal.classList.add('hidden'); screenshotImage.src = ''; } });
        
        // Initial render
        calculateAndRender();
    </script>
