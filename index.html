<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AshTale 火力スコアアナライザ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2canvas for Screenshot -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(30, 41, 59, 0.8);
            border-radius: 3px;
        }
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        #screenshot-container { display: none; }
        .hide-on-screenshot { display: inherit; }
        
        #input-memo-header {
            resize: none;
            overflow-y: hidden;
            line-height: 1.5;
            text-align: left;
        }

        .info-popup {
            animation: fadeIn 0.15s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ss-no-wrap {
            white-space: nowrap !important;
        }

        .loading-pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }
        
        /* 隠しボタンのアニメーション */
        #btn-gemini-trigger.hidden { display: none; }
        #btn-gemini-trigger.visible {
            display: flex;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 入力エラー時の震動アニメーション */
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-3px, 0, 0); }
            40%, 60% { transform: translate3d(3px, 0, 0); }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 selection:bg-cyan-900 selection:text-cyan-50">
    <div class="min-h-screen p-4 md:p-6" id="capture-area">
        <div class="max-w-5xl mx-auto">
            
            <!-- ヘッダー -->
            <header class="mb-6 border-b border-slate-800 pb-4" id="ui-header">
                <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                    <div class="text-center md:text-left w-full md:w-auto">
                        <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 flex items-center justify-center md:justify-start">
                            <i data-lucide="flame" class="w-6 h-6 mr-3 text-cyan-400"></i>
                            AshTale 火力スコアアナライザ
                        </h1>
                        <p class="text-slate-500 mt-1 text-[10px] uppercase tracking-widest font-bold opacity-70">
                            Damage Score Reverse Calculation Tool
                        </p>
                    </div>
                    
                    <div class="flex flex-col items-center md:items-end gap-3 w-full md:w-auto">
                        <div class="flex flex-row items-center justify-center md:justify-end gap-3 w-full">
                            <div id="current-time" class="flex items-center text-[11px] text-cyan-500 font-mono bg-cyan-950/30 px-3 h-[34px] rounded-sm border border-cyan-900/40 shadow-inner">
                                <i data-lucide="clock" class="w-3.5 h-3.5 mr-2 opacity-70"></i>
                                <span id="time-display">--/--/-- --:--:--</span>
                            </div>
                            <button id="btn-screenshot" class="hide-on-screenshot flex items-center px-4 h-[34px] bg-slate-900 hover:bg-slate-800 border border-slate-700 text-cyan-400 hover:text-cyan-300 rounded-sm text-xs font-bold transition-all shadow-sm">
                                <i data-lucide="camera" class="w-4 h-4 mr-2"></i>
                                画面を保存
                            </button>
                        </div>
                        <div class="w-full md:max-w-[320px]">
                            <textarea id="input-memo-header" rows="1" placeholder="メモを入力（スクショに反映されます）" class="w-full bg-slate-950/50 border border-slate-800 hover:border-slate-700 rounded-sm px-3 py-1.5 text-[11px] text-slate-400 focus:outline-none focus:border-cyan-900/40 transition-all font-mono placeholder-slate-700 text-left"></textarea>
                        </div>
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 md:gap-6">
                
                <!-- 左カラム -->
                <div class="lg:col-span-5 flex flex-col gap-4">
                    
                    <!-- 参照画像 -->
                    <div id="reference-image-section" class="hidden hide-on-screenshot bg-slate-900 border border-slate-800 rounded-sm p-4 shadow-md flex-col">
                        <div class="flex justify-between items-center mb-3 border-b border-slate-800 pb-2">
                            <h2 class="text-sm font-bold text-slate-300 flex items-center tracking-wide uppercase">
                                <i data-lucide="image" class="w-4 h-4 mr-2 text-indigo-500"></i>
                                参照画像
                            </h2>
                            <button id="btn-clear-images" class="flex items-center text-[10px] text-slate-500 hover:text-red-400 transition-colors bg-slate-950 px-2 py-1 rounded-sm border border-slate-800">
                                <i data-lucide="x" class="w-3 h-3 mr-1"></i>CLEAR
                            </button>
                        </div>
                        <div class="flex justify-center bg-black/60 rounded-sm overflow-auto max-h-[35vh] border border-slate-800">
                            <img id="main-reference-img" src="" class="block object-contain max-w-full h-auto" style="display: none;" />
                        </div>
                        <div id="image-thumbnails" class="mt-3 flex gap-2 overflow-x-auto custom-scrollbar pb-1" style="display: none;"></div>
                    </div>

                    <!-- ステータス入力 -->
                    <div class="bg-slate-900 border border-slate-800 rounded-sm p-4 shadow-md relative" id="ui-status">
                        <div class="flex justify-between items-center mb-3 border-b border-slate-800 pb-2">
                            <h2 class="text-sm font-bold text-slate-300 flex items-center">
                                <span id="ui-status-icon" class="cursor-pointer select-none active:scale-95 transition-transform mr-2 block">
                                    <i data-lucide="target" class="w-4 h-4 text-blue-500 pointer-events-none"></i>
                                </span>
                                現在のステータス
                                <button id="btn-gemini-trigger" class="hidden ml-3 p-1 rounded-sm bg-indigo-500/20 text-indigo-400 hover:bg-indigo-500/40 transition-all border border-indigo-500/30" title="AI解析を実行">
                                    <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
                                </button>
                            </h2>
                            <div class="hide-on-screenshot flex items-center gap-2">
                                <input type="file" id="image-upload" accept="image/*" multiple class="hidden">
                                <label for="image-upload" class="flex items-center justify-center px-3 h-[34px] bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-sm text-[10px] font-bold cursor-pointer transition-colors text-slate-400">
                                    <i data-lucide="image-plus" class="w-3.5 h-3.5 mr-1.5 text-indigo-500"></i>画像を見ながら入力
                                </label>
                            </div>
                        </div>

                        <!-- AI解析ステータス -->
                        <div id="ai-status-container" class="hidden mb-3 p-2 bg-indigo-950/20 border border-indigo-900/50 rounded-sm text-[10px] text-indigo-300 font-mono loading-pulse flex items-center">
                            <i data-lucide="loader-2" class="w-3 h-3 mr-2 animate-spin"></i>
                            <span id="ai-status-text">AIが画像を解析中...</span>
                        </div>

                        <div class="grid grid-cols-1 xl:grid-cols-2 gap-x-6 gap-y-1">
                            <!-- 入力項目 (省略なし) -->
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="sword" class="w-3.5 h-3.5 mr-2 text-cyan-600"></i><span>攻撃力</span></label>
                                <input type="text" id="input-atk" class="w-28 sm:w-32 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="eye" class="w-3.5 h-3.5 mr-2 text-cyan-600"></i><span>威圧</span></label>
                                <input type="text" id="input-intimidation" class="w-28 sm:w-32 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="zap" class="w-3.5 h-3.5 mr-2 text-cyan-600"></i><span>ダメージ倍率</span></label>
                                <input type="text" id="input-dmgMul" class="w-28 sm:w-32 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="arrow-up-circle" class="w-3.5 h-3.5 mr-2 text-cyan-600"></i><span>与ダメージ増加</span></label>
                                <input type="text" id="input-dmgInc" class="w-28 sm:w-32 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="crosshair" class="w-3.5 h-3.5 mr-2 text-cyan-600"></i><span>会心ダメージ</span></label>
                                <input type="text" id="input-critDmg" class="w-28 sm:w-32 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="shield-alert" class="w-3.5 h-3.5 mr-2 text-cyan-600"></i><span>防御無視</span></label>
                                <input type="text" id="input-defIgn" class="w-28 sm:w-32 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="skull" class="w-3.5 h-3.5 mr-2 text-cyan-600"></i><span>対ボス与ダメ増</span></label>
                                <input type="text" id="input-bossDmg" class="w-28 sm:w-32 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="zap" class="w-3.5 h-3.5 mr-2 text-cyan-700"></i><span>状態異常与ダメ増</span></label>
                                <input type="text" id="input-statusDmg" class="w-28 sm:w-32 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="target" class="w-3.5 h-3.5 mr-2 text-cyan-700"></i><span>対高HP与ダメ増</span></label>
                                <input type="text" id="input-highHpDmg" class="w-28 sm:w-32 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                            </div>
                            <div class="flex justify-between items-center py-1.5 px-1 border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                <label class="flex items-center text-xs font-medium text-slate-400"><i data-lucide="target" class="w-3.5 h-3.5 mr-2 text-cyan-700"></i><span>対低HP与ダメ増</span></label>
                                <input type="text" id="input-lowHpDmg" class="w-28 sm:w-32 bg-slate-950 border border-slate-800 text-slate-100 text-right text-xs rounded-sm px-2 py-1 focus:outline-none focus:border-cyan-600 transition-all font-mono" />
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右カラム -->
                <div class="lg:col-span-7 flex flex-col gap-4 h-full">
                    <div class="bg-slate-900 border border-slate-800 rounded-sm p-4 md:p-5 shadow-md flex-1" id="ui-result">
                        <div class="mb-4 flex items-center justify-between border-b border-slate-800 pb-2">
                            <div class="flex items-center">
                                <i data-lucide="arrow-up-circle" class="w-4 h-4 mr-2 text-cyan-500"></i>
                                <h2 class="text-sm font-bold text-slate-300">火力1%UPに必要なステータス</h2>
                            </div>
                        </div>
                        <div id="results-container" class="space-y-0"></div>
                    </div>
                </div>

            </div>
            
            <footer class="mt-8 pt-4 border-t border-slate-800/60 flex flex-col sm:flex-row justify-between items-center text-[10px] text-slate-600 font-mono tracking-tighter">
                <div>&copy; 2026 AshTale Score Analyzer</div>
                <div class="text-cyan-900">Version 1.0.7</div>
            </footer>
        </div>
    </div>

    <!-- APIキー設定モーダル -->
    <div id="api-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-slate-900 border border-indigo-900/40 p-6 rounded-sm shadow-2xl w-full max-w-sm">
            <div class="flex items-center gap-3 mb-4 text-indigo-400">
                <span id="secret-exec-icon" class="cursor-pointer active:scale-90 transition-transform p-1 hover:bg-white/5 rounded-sm">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                </span>
                <h3 class="text-sm font-bold uppercase tracking-widest">AI Status Parser</h3>
            </div>
            <p class="text-[10px] text-slate-400 mb-5 leading-relaxed">
                Google Gemini AIを使用して画像から数値を抽出します。<br>
                ステータス項目を自動で入力欄に反映させることが可能です。
            </p>
            <div class="space-y-4">
                <input type="password" id="gemini-api-key-input" placeholder="APIキーを入力してください" class="w-full bg-slate-950 border border-slate-800 rounded-sm px-3 py-2.5 text-xs text-white focus:outline-none focus:border-indigo-700 font-mono placeholder-slate-700 transition-all" />
                <div class="flex gap-2">
                    <button id="btn-save-api-key" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white text-[11px] font-bold py-2.5 rounded-sm transition-all uppercase tracking-widest active:scale-95 shadow-lg">
                        実行する
                    </button>
                    <button id="btn-close-api-modal" class="px-4 bg-slate-800 hover:bg-slate-700 text-slate-400 text-[11px] font-bold py-2.5 rounded-sm transition-all active:scale-95">
                        閉じる
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- エラー詳細表示モーダル -->
    <div id="error-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center bg-black/95 p-4 backdrop-blur-sm">
        <div class="bg-slate-900 border border-red-900/40 p-5 rounded-sm shadow-2xl w-full max-w-md">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3 text-red-400">
                    <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                    <h3 class="text-sm font-bold uppercase tracking-widest">Analysis Error</h3>
                </div>
                <button id="btn-close-error" class="text-slate-500 hover:text-white transition-colors bg-slate-800 p-1 rounded-sm">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="bg-black/60 border border-slate-800 p-4 rounded-sm mb-4">
                <p id="error-message-summary" class="text-xs text-slate-300 font-bold mb-2">解析に失敗しました。</p>
                <div id="error-details" class="text-[10px] text-slate-500 font-mono break-all whitespace-pre-wrap leading-relaxed max-h-[45vh] overflow-y-auto custom-scrollbar pt-2 border-t border-slate-800"></div>
            </div>
            <button id="btn-copy-error" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 text-[10px] font-bold py-2.5 rounded-sm transition-all flex items-center justify-center gap-2 border border-slate-700">
                <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                エラー内容をコピー
            </button>
        </div>
    </div>

    <!-- スクショ用レイアウト -->
    <div id="screenshot-temp-wrapper" style="position: absolute; left: -9999px; top: -9999px; background-color: #020617;">
        <div id="screenshot-layout-root" class="bg-slate-950 text-slate-200 p-5 flex items-end gap-3" style="width: 450px;">
            <div id="ss-left-col" class="flex-1 flex flex-col gap-3"></div>
            <div id="ss-right-col" class="flex-1"></div>
        </div>
    </div>

    <!-- スクショ保存用モーダル -->
    <div id="screenshot-modal" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/95 backdrop-blur-sm p-4">
        <div class="bg-slate-900 border border-slate-800 p-4 rounded-sm shadow-2xl max-w-full max-h-full flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <p class="text-xs text-cyan-600 font-bold flex items-center">
                    <i data-lucide="download" class="w-3.5 h-3.5 mr-2"></i>画像を長押しして保存
                </p>
                <button id="btn-close-screenshot-modal" class="text-slate-500 hover:text-white transition-colors bg-slate-800 p-1.5 rounded-sm">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="overflow-auto bg-black flex-1 border border-slate-800 rounded-sm">
                <img id="screenshot-image" src="" alt="Screenshot" class="max-w-full h-auto object-contain mx-auto block" />
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let geminiApiKey = ""; 
        let hasSetupInitial = false;

        const state = {
            stats: {
                atk: '', intimidation: '', dmgMul: '', dmgInc: '', critDmg: '', 
                defIgn: '', bossDmg: '', statusDmg: '', 
                highHpDmg: '', lowHpDmg: ''
            }
        };

        const inputs = {
            atk: document.getElementById('input-atk'),
            intimidation: document.getElementById('input-intimidation'),
            dmgMul: document.getElementById('input-dmgMul'),
            dmgInc: document.getElementById('input-dmgInc'),
            critDmg: document.getElementById('input-critDmg'),
            defIgn: document.getElementById('input-defIgn'),
            bossDmg: document.getElementById('input-bossDmg'),
            statusDmg: document.getElementById('input-statusDmg'),
            highHpDmg: document.getElementById('input-highHpDmg'),
            lowHpDmg: document.getElementById('input-lowHpDmg'),
        };

        const resultsContainer = document.getElementById('results-container');
        const timeDisplay = document.getElementById('time-display');
        const btnScreenshot = document.getElementById('btn-screenshot');
        
        const statusIcon = document.getElementById('ui-status-icon');
        const btnGeminiTrigger = document.getElementById('btn-gemini-trigger');
        const apiModal = document.getElementById('api-modal');
        const apiKeyInput = document.getElementById('gemini-api-key-input');
        const btnSaveApiKey = document.getElementById('btn-save-api-key');
        const btnCloseApiModal = document.getElementById('btn-close-api-modal');
        const secretExecIcon = document.getElementById('secret-exec-icon');
        const aiStatusContainer = document.getElementById('ai-status-container');
        const aiStatusText = document.getElementById('ai-status-text');

        // Error UI
        const errorModal = document.getElementById('error-modal');
        const errorDetails = document.getElementById('error-details');
        const errorSummary = document.getElementById('error-message-summary');
        const btnCloseError = document.getElementById('btn-close-error');
        const btnCopyError = document.getElementById('btn-copy-error');

        const screenshotModal = document.getElementById('screenshot-modal');
        const screenshotImage = document.getElementById('screenshot-image');
        const btnCloseScreenshotModal = document.getElementById('btn-close-screenshot-modal');
        const fileInput = document.getElementById('image-upload');
        const refImageSection = document.getElementById('reference-image-section');
        const mainReferenceImg = document.getElementById('main-reference-img');
        const imageThumbnails = document.getElementById('image-thumbnails');
        const btnClearImages = document.getElementById('btn-clear-images');
        
        let loadedImages = [];
        let selectedImgIndex = 0;

        function updateTime() {
            const now = new Date();
            timeDisplay.textContent = now.toLocaleString('ja-JP', { 
                year: 'numeric', month: '2-digit', day: '2-digit', 
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            });
        }
        setInterval(updateTime, 1000);
        updateTime();

        function adjustMemoHeight() {
            const memo = document.getElementById('input-memo-header');
            memo.style.height = 'auto';
            memo.style.height = memo.scrollHeight + 'px';
        }
        document.getElementById('input-memo-header').addEventListener('input', adjustMemoHeight);

        function createResultRow(label, value, key, unit = '', isScreenshot = false) {
            const displayUnit = (value !== '---' && value !== 0) ? unit : '';
            let infoBtnHtml = '';
            if (!isScreenshot) {
                if (key === 'highHpDmg' || key === 'lowHpDmg') {
                    infoBtnHtml = `<div class="relative group ml-1.5 inline-block"><i data-lucide="info" class="w-3 h-3 text-slate-600 cursor-help"></i><div class="absolute left-0 bottom-full mb-2 hidden group-hover:block z-50 w-48 p-2 bg-slate-800 text-[10px] text-slate-200 rounded shadow-lg border border-slate-700 info-popup">稼働率を50%と仮定。</div></div>`;
                } else if (key === 'defIgn') {
                    infoBtnHtml = `<div class="relative group ml-1.5 inline-block"><i data-lucide="info" class="w-3 h-3 text-slate-600 cursor-help"></i><div class="absolute left-0 bottom-full mb-2 hidden group-hover:block z-50 w-48 p-2 bg-slate-800 text-[10px] text-slate-200 rounded shadow-lg border border-slate-700 info-popup">計算対象外。</div></div>`;
                }
            }
            const rowClass = isScreenshot ? "flex justify-between items-center py-1 px-1 border-b border-slate-800/40" : "flex justify-between items-center py-2 px-2 border-b border-slate-800/40 hover:bg-slate-800/10 transition-colors";
            const labelClass = isScreenshot ? "text-[8px] text-slate-400 ss-no-wrap" : "text-xs text-slate-400";
            const valClass = isScreenshot ? "text-[9px] font-mono font-bold text-slate-100" : "text-sm font-mono font-bold text-slate-100";
            return `<div class="${rowClass}"><div class="flex items-center"><span class="${labelClass}">${label}</span>${infoBtnHtml}</div><div class="flex items-center"><span class="${valClass}">${value}${displayUnit}</span></div></div>`;
        }

        function calculateAndRender() {
            const v = {
                atk: parseFloat(state.stats.atk) || 0,
                dmgMul: parseFloat(state.stats.dmgMul) || 0,
                dmgInc: parseFloat(state.stats.dmgInc) || 0,
                critDmg: parseFloat(state.stats.critDmg) || 0,
                bossDmg: parseFloat(state.stats.bossDmg) || 0,
                statusDmg: parseFloat(state.stats.statusDmg) || 0,
                highHpDmg: parseFloat(state.stats.highHpDmg) || 0,
                lowHpDmg: parseFloat(state.stats.lowHpDmg) || 0,
                intimidation: parseFloat(state.stats.intimidation) || 0,
            };
            const shlSum = v.statusDmg + v.highHpDmg + v.lowHpDmg;
            const isAnyInput = Object.values(state.stats).some(val => val !== '');
            const p = {
                atk: v.atk * 0.01,
                intimidation: isAnyInput ? (10 + (v.intimidation * 0.01)) : 0,
                dmgMul: v.dmgMul, 
                dmgInc: v.dmgInc * 0.01,
                critDmg: v.critDmg * 0.01,
                bossDmg: v.bossDmg * 0.01,
                statusDmg: shlSum * 0.01,
                highHpDmg: shlSum * 0.02, 
                lowHpDmg: shlSum * 0.02,  
                defIgn: '---'
            };
            Object.keys(p).forEach(key => {
                if (typeof p[key] === 'number') p[key] = p[key] > 0 ? p[key].toFixed(2) : 0;
            });
            resultsContainer.innerHTML = `
                <div class="flex justify-between px-2 pb-1 text-[10px] font-bold text-slate-600 border-b border-slate-800/30 uppercase tracking-tighter"><span>Stat Name</span><span>Required Amount</span></div>
                ${createResultRow('攻撃力', p.atk, 'atk')}
                ${createResultRow('威圧', p.intimidation, 'intimidation')}
                ${createResultRow('ダメージ倍率', p.dmgMul, 'dmgMul', '%')}
                ${createResultRow('与ダメージ増加', p.dmgInc, 'dmgInc', '%')}
                ${createResultRow('会心ダメージ', p.critDmg, 'critDmg', '%')}
                ${createResultRow('対ボス与ダメ増', p.bossDmg, 'bossDmg', '%')}
                ${createResultRow('状態異常与ダメ増', p.statusDmg, 'statusDmg', '%')}
                ${createResultRow('対高HP与ダメ増', p.highHpDmg, 'highHpDmg', '%')}
                ${createResultRow('対低HP与ダメ増', p.lowHpDmg, 'lowHpDmg', '%')}
                ${createResultRow('防御無視', p.defIgn, 'defIgn')}
            `;
            lucide.createIcons();
            Object.keys(inputs).forEach(key => { inputs[key].value = state.stats[key]; });
            state.calculatedPoints = p;
        }

        Object.keys(inputs).forEach(key => {
            inputs[key].addEventListener('input', (e) => {
                const val = e.target.value;
                if (val === '' || /^\d*\.?\d*$/.test(val)) {
                    state.stats[key] = val;
                    calculateAndRender();
                } else {
                    e.target.value = state.stats[key];
                }
            });
        });

        // 隠しボタンのトリガー (ダブルクリック)
        let iconClickCount = 0;
        let iconClickTimer;
        statusIcon.addEventListener('click', () => {
            iconClickCount++;
            clearTimeout(iconClickTimer);
            if (iconClickCount >= 2) {
                btnGeminiTrigger.classList.remove('hidden');
                btnGeminiTrigger.classList.add('visible');
                iconClickCount = 0;
            } else {
                iconClickTimer = setTimeout(() => { iconClickCount = 0; }, 300);
            }
        });

        btnGeminiTrigger.addEventListener('click', () => {
            if (!hasSetupInitial) {
                apiModal.classList.remove('hidden');
            } else {
                triggerFileUpload();
            }
        });

        function triggerFileUpload() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            input.onchange = (e) => handleGeminiOcr(Array.from(e.target.files));
            input.click();
        }

        // シークレット実行 (キラキラアイコン)
        secretExecIcon.addEventListener('click', () => {
            geminiApiKey = ""; // 空文字 = 内部プレビューモデルを使用
            hasSetupInitial = true;
            apiModal.classList.add('hidden');
            triggerFileUpload();
        });

        // キーあり実行
        btnSaveApiKey.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (!key) {
                apiKeyInput.classList.add('border-red-600', 'shake');
                setTimeout(() => apiKeyInput.classList.remove('border-red-600', 'shake'), 400);
                return;
            }
            geminiApiKey = key; 
            hasSetupInitial = true;
            apiModal.classList.add('hidden');
            triggerFileUpload();
        });
        
        btnCloseApiModal.addEventListener('click', () => apiModal.classList.add('hidden'));

        function showAnalysisError(summary, details) {
            errorSummary.textContent = summary;
            errorDetails.textContent = details;
            errorModal.classList.remove('hidden');
        }

        btnCloseError.addEventListener('click', () => { errorModal.classList.add('hidden'); });

        btnCopyError.addEventListener('click', () => {
            const text = `Error: ${errorSummary.textContent}\nLogs:\n${errorDetails.textContent}`;
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            btnCopyError.textContent = "コピー完了";
            setTimeout(() => { btnCopyError.textContent = "エラー内容をコピー"; }, 2000);
        });

        // API Call (Model Name Switching Logic)
        async function callGemini(payload, currentKey, retryCount = 0) {
            // キーがないときはプレビューモデル名、あるときは安定版モデル名(-latest必須)
            const modelName = currentKey === "" ? "gemini-2.5-flash-preview-09-2025" : "gemini-1.5-flash-latest";
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${currentKey}`;
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (!response.ok) {
                    const errorDetailStr = result.error ? JSON.stringify(result.error, null, 2) : `HTTP status: ${response.status}`;
                    
                    if (response.status >= 500 && retryCount < 5) {
                        const delay = Math.pow(2, retryCount) * 1000;
                        await new Promise(r => setTimeout(r, delay));
                        return callGemini(payload, currentKey, retryCount + 1);
                    }
                    throw new Error(`API Error Code: ${response.status}\nModel used: ${modelName}\n\nDetails:\n${errorDetailStr}`);
                }
                return result;
            } catch (err) {
                if (err.message.includes('fetch') && retryCount < 5) {
                    const delay = Math.pow(2, retryCount) * 1000;
                    await new Promise(r => setTimeout(r, delay));
                    return callGemini(payload, currentKey, retryCount + 1);
                }
                throw err;
            }
        }

        async function handleGeminiOcr(files) {
            if (!files.length) return;
            aiStatusContainer.classList.remove('hidden');
            aiStatusText.textContent = "AI解析を準備中...";

            try {
                const imageParts = await Promise.all(files.map(async file => {
                    const base64 = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.onerror = () => reject(new Error("画像の読み込みに失敗しました。"));
                        reader.readAsDataURL(file);
                    });
                    return { inlineData: { mimeType: file.type, data: base64 } };
                }));

                const systemPrompt = `AshTale(アッシュテイル)のステータス画面を解析してください。
以下のJSON形式で数値を抽出してください（%記号は不要、抽出不可はnull）。
{"atk":数, "intimidation":数, "dmgMul":数, "dmgInc":数, "critDmg":数, "defIgn":数, "bossDmg":数, "statusDmg":数, "highHpDmg":数, "lowHpDmg":数}`;

                const payload = {
                    contents: [{ parts: [{ text: "画像から数値を抽出してください。" }, ...imageParts] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: { responseMimeType: "application/json" }
                };

                const result = await callGemini(payload, geminiApiKey);
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (!text) throw new Error("解析データが取得できませんでした。");

                const data = JSON.parse(text);
                Object.keys(data).forEach(key => {
                    if (data[key] !== null) state.stats[key] = String(data[key]);
                });

                calculateAndRender();
                aiStatusText.textContent = "読み込み完了！";
                setTimeout(() => aiStatusContainer.classList.add('hidden'), 3000);
            } catch (err) {
                console.error(err);
                aiStatusContainer.classList.add('hidden');
                showAnalysisError("AI解析エラー (404/403等の詳細)", err.message);
            }
        }

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            refImageSection.classList.remove('hidden');
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    loadedImages.push(ev.target.result);
                    renderThumbnails();
                    if (loadedImages.length === 1) setMainImage(0);
                };
                reader.readAsDataURL(file);
            });
            fileInput.value = '';
        });

        function renderThumbnails() {
            imageThumbnails.innerHTML = '';
            if (loadedImages.length <= 1) {
                imageThumbnails.style.display = 'none';
            } else {
                imageThumbnails.style.display = 'flex';
                loadedImages.forEach((data, idx) => {
                    const img = document.createElement('img');
                    img.src = data;
                    const isSelected = idx === selectedImgIndex;
                    img.className = `w-12 h-12 object-cover border-2 rounded-sm cursor-pointer transition-all flex-shrink-0 ${isSelected ? 'border-cyan-500 opacity-100' : 'border-transparent opacity-50 hover:opacity-100'}`;
                    img.onclick = () => setMainImage(idx);
                    imageThumbnails.appendChild(img);
                });
            }
        }

        function setMainImage(idx) {
            selectedImgIndex = idx;
            mainReferenceImg.src = loadedImages[idx];
            mainReferenceImg.style.display = 'block';
            renderThumbnails();
        }

        btnClearImages.addEventListener('click', () => {
            loadedImages = [];
            selectedImgIndex = 0;
            mainReferenceImg.src = '';
            mainReferenceImg.style.display = 'none';
            refImageSection.classList.add('hidden');
        });

        btnScreenshot.addEventListener('click', async () => {
            document.body.style.cursor = 'wait';
            const ssLeftCol = document.getElementById('ss-left-col');
            const ssRightCol = document.getElementById('ss-right-col');
            ssLeftCol.innerHTML = '';
            ssRightCol.innerHTML = '';

            const headerClone = document.getElementById('ui-header').cloneNode(true);
            headerClone.className = "border-b border-slate-800 pb-1 mb-1";
            const h1 = headerClone.querySelector('h1');
            if (h1) h1.style.cssText = "background:none !important; color:#22d3ee !important; -webkit-text-fill-color:#22d3ee !important; font-size:14px !important; line-height:1 !important;";
            headerClone.querySelector('p')?.remove();
            headerClone.querySelector('#current-time').querySelector('i')?.remove();
            const memoTextarea = headerClone.querySelector('textarea');
            if (memoTextarea) {
                const val = document.getElementById('input-memo-header').value.trim();
                const display = document.createElement('div');
                display.className = "text-[7px] text-slate-400 font-mono text-left whitespace-pre-wrap leading-tight mt-1 px-1 border-l border-slate-800";
                display.textContent = val || "";
                if (!val) display.style.display = 'none';
                memoTextarea.parentNode.replaceChild(display, memoTextarea);
            }
            headerClone.querySelector('button')?.remove();
            ssLeftCol.appendChild(headerClone);

            const statusClone = document.getElementById('ui-status').cloneNode(true);
            statusClone.className = "bg-slate-900/50 border border-slate-800 rounded-sm p-2 flex-1";
            statusClone.querySelector('h2').className = "text-[8px] font-bold text-slate-400 mb-1 ss-no-wrap";
            statusClone.querySelectorAll('.flex.justify-between').forEach(row => {
                const input = row.querySelector('input');
                if (input) {
                    const val = input.value || "0";
                    const display = document.createElement('div');
                    display.className = "text-[9px] font-mono font-bold text-slate-100 flex items-center justify-end h-full";
                    display.textContent = val;
                    input.parentNode.replaceChild(display, input);
                    row.className = "flex justify-between items-center py-1 px-1 border-b border-slate-800/40";
                    const label = row.querySelector('label');
                    if (label) {
                        label.className = "text-[8px] text-slate-500 ss-no-wrap flex items-center";
                        const icon = label.querySelector('i');
                        if (icon) icon.style.cssText = "width:10px !important; height:10px !important; margin-right:4px !important;";
                    }
                }
            });
            statusClone.querySelectorAll('p, #ai-status-container, .hide-on-screenshot').forEach(el => el.remove());
            ssLeftCol.appendChild(statusClone);

            const resultClone = document.getElementById('ui-result').cloneNode(true);
            resultClone.className = "bg-slate-900 border border-slate-800 rounded-sm p-2 h-full";
            resultClone.querySelector('h2').className = "text-[8px] font-bold text-cyan-600 mb-1 ss-no-wrap";
            const p = state.calculatedPoints;
            resultClone.querySelector('#results-container').innerHTML = `
                <div class="flex justify-between px-1 pb-1 text-[6px] font-bold text-slate-700 border-b border-slate-800/30 uppercase tracking-tighter ss-no-wrap"><span>Stat Name</span><span>Req.</span></div>
                ${createResultRow('攻撃力', p.atk, 'atk', '', true)}${createResultRow('威圧', p.intimidation, 'intimidation', '', true)}${createResultRow('ダメージ倍率', p.dmgMul, 'dmgMul', '%', true)}${createResultRow('与ダメージ増加', p.dmgInc, 'dmgInc', '%', true)}${createResultRow('会心ダメージ', p.critDmg, 'critDmg', '%', true)}${createResultRow('対ボス与ダメ増', p.bossDmg, 'bossDmg', '%', true)}${createResultRow('状態異常与ダメ増', p.statusDmg, 'statusDmg', '%', true)}${createResultRow('対高HP与ダメ増', p.highHpDmg, 'highHpDmg', '%', true)}${createResultRow('対低HP与ダメ増', p.lowHpDmg, 'lowHpDmg', '%', true)}${createResultRow('防御無視', p.defIgn, 'defIgn', '', true)}
            `;
            ssRightCol.appendChild(resultClone);

            setTimeout(() => {
                html2canvas(document.getElementById('screenshot-layout-root'), { backgroundColor: '#020617', scale: 2, logging: false, useCORS: true, width: 450 }).then(canvas => {
                    document.body.style.cursor = 'default';
                    screenshotImage.src = canvas.toDataURL('image/png');
                    screenshotModal.classList.remove('hidden');
                }).catch(() => {
                    document.body.style.cursor = 'default';
                    alert('保存に失敗しました。');
                });
            }, 600);
        });

        btnCloseScreenshotModal.addEventListener('click', () => { screenshotModal.classList.add('hidden'); screenshotImage.src = ''; });
        screenshotModal.addEventListener('click', (e) => { if (e.target === screenshotModal) { screenshotModal.classList.add('hidden'); screenshotImage.src = ''; } });
        calculateAndRender();
    </script>
</body>
